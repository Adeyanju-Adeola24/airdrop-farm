name: Airdrop Farm
on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Testnet (all, scroll, base, monad)'
        required: true
        default: 'all'
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Generate wallets
        run: node -e "
          const {ethers} = require('ethers');
          const fs = require('fs');
          const networks = ['scroll','base','monad'];
          const count = 20;
          fs.mkdirSync('wallets', {recursive: true});
          for(const net of networks) {
            const wallets = [];
            for(let i=0;i<count;i++) {
              const w = ethers.Wallet.createRandom();
              wallets.push({address: w.address, privateKey: w.privateKey});
            }
            fs.writeFileSync('wallets/' + net + '-wallets.json', JSON.stringify(wallets, null, 2));
            console.log('Generated ' + count + ' wallets for ' + net);
          }
          console.log('Done! All wallets saved.');
        "
      - uses: actions/upload-artifact@v4
        with:
          name: wallets
          path: wallets/
          retention-days: 90
